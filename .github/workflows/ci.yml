name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - name: Typecheck
        run: bunx tsc --noEmit

      - name: Unit tests
        run: bunx vitest run

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: E2E tests
        run: bunx playwright test

      - name: Build docs site
        run: bun packages/core/src/cli/index.ts build .
