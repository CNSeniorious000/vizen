title = "Getting Started"

  [[nav.children]]
  title = "Installation"
  url = "getting-started/installation.md"

  [[nav.children]]
  title = "Configuration"
  url = "getting-started/configuration.md"

  [[nav.children]]
  title = "Markdown Syntax"
  url = "getting-started/markdown.md"

