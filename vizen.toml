# vizen.toml — vizen's own documentation site (dogfooding: vizen documents itself).
site_name = "vizen"
site_description = "A modern static site generator with perfect HMR and client-side navigation — a TS port of zensical (Material for MkDocs) on Vite."
site_url = "https://vizen.vercel.app"
repo_url = "https://github.com/CNSeniorious000/vizen"
repo_name = "CNSeniorious000/vizen"
docs_dir = "docs"

[theme]
name = "material"
variant = "modern"
features = [
  "search.highlight",
  "navigation.instant",
  "navigation.instant.progress",
  "navigation.instant.prefetch",
  "navigation.path",
  "navigation.tabs",
  "navigation.sections",
  "navigation.footer",
  "toc.follow",
  "content.code.annotate",
  "content.code.copy",
  "content.tooltips",
]

[[nav]]
title = "Home"
url = "index.md"

