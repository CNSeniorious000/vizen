# vizen.toml — vizen's own documentation site (dogfooding: vizen documents itself).
site_name = "vizen"
site_description = "A modern static site generator with perfect HMR and client-side navigation — a TS port of zensical (Material for MkDocs) on Vite."
site_url = "https://vizen.vercel.app"
docs_dir = "docs"

[theme]
name = "material"
variant = "modern"
features = [
  "navigation.instant",
  "navigation.tabs",
]

